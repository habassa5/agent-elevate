<!doctype html><html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1280px;height:640px;overflow:hidden}
  body{font-family:'Inter Tight',sans-serif;color:#e8edf4;position:relative;
    background:
      radial-gradient(760px 560px at 8% -12%, rgba(16,185,129,.16), rgba(16,185,129,0) 60%),
      radial-gradient(820px 620px at 112% 120%, rgba(56,120,255,.12), rgba(56,120,255,0) 58%),
      #0b0e14;}
  .wrap{height:100%;padding:60px 78px;display:flex;flex-direction:column;justify-content:space-between}
  .top{display:flex;align-items:center;gap:13px}
  .ico{width:42px;height:42px}
  .brand{font-size:21px;font-weight:600;letter-spacing:.2px;color:#c4d0de}
  h1{font-size:96px;font-weight:800;line-height:.97;letter-spacing:-3.5px;color:#fff}
  h1 .p{color:#34d399}
  .term{margin-top:30px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.10);border-radius:13px;
    padding:18px 22px;font-family:'JetBrains Mono',monospace;font-size:18px;line-height:1.7;max-width:760px;box-shadow:0 24px 60px rgba(0,0,0,.45)}
  .term .a{color:#7c8aa0}.term .c{color:#9fe7d6}.term .ok{color:#34d399;font-weight:700}.term .m{color:#6b7a90}
  .sub{font-size:20px;color:#94a3b8;margin-top:20px;max-width:720px}.sub b{color:#dbe5f0;font-weight:600}
  .bottom{display:flex;align-items:center;justify-content:space-between}
  .reassure{font-size:16px;color:#9fb0c4;font-weight:500;display:flex;gap:15px;align-items:center}
  .reassure .sep{color:#34d399;font-size:7px;position:relative;top:-2px}
  .url{font-size:15px;color:#5f7088;font-family:'JetBrains Mono',monospace}
</style></head><body><div class="wrap">
  <div class="top">
    <svg class="ico" viewBox="0 0 48 48"><defs><clipPath id="sh"><path d="M24 3.5 L40 8.6 V22.5 C40 32.4 33.2 39.6 24 42.5 C14.8 39.6 8 32.4 8 22.5 V8.6 Z"/></clipPath></defs>
      <g clip-path="url(#sh)"><rect width="24" height="48" fill="#0a84d8"/><rect x="24" width="24" height="48" fill="#fcc017"/></g>
      <path d="M24 3.5 L40 8.6 V22.5 C40 32.4 33.2 39.6 24 42.5 C14.8 39.6 8 32.4 8 22.5 V8.6 Z" fill="none" stroke="#fff" stroke-width="1.4"/>
      <path d="M24 14.2 L32 23 H27.4 V30.6 H20.6 V23 H16 Z" fill="#fff" stroke="#0a4a78" stroke-width="0.7" stroke-linejoin="round"/></svg>
    <div class="brand">AgentElevate</div>
  </div>
  <div>
    <h1>Admin, without the ask<span class="p">.</span></h1>
    <div class="term">
      <div><span class="a">agent&nbsp;&#9656;</span> <span class="c">elevate winget-install Git.Git</span></div>
      <div><span class="m">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&#8627;</span> <span class="ok">ran as SYSTEM</span> <span class="m">&middot; no UAC &middot; audited</span></div>
    </div>
  </div>
  <div class="bottom">
    <div class="reassure">sudo for Windows, built for AI agents <span class="sep">&#9679;</span> unattended</div>
    <div class="url">github.com/habassa5/agent-elevate</div>
  </div>
</div></body></html>
